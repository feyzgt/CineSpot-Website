<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CineSpot – Movies</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-dark-frame">
  <header class="cs-header">
    <div class="cs-header-inner"> 
      <div class="cs-header-left">
        <a href="index.html" class="cs-logo-link">
          <img
            src="images/cinespot_transparent_bg.png"
            alt="CineSpot logo"
            class="cs-logo-image"
          />
        </a>
      </div>

      <nav class="cs-nav">
        <a href="index.html" class="cs-nav-link">Now Showing</a>
        <a href="cinemas.html" class="cs-nav-link">Cinemas</a>
        <a href="advance-ticket-selling.html" class="cs-nav-link">Advance Ticket Selling</a>
        <a href="coming-soon.html" class="cs-nav-link">Coming Soon</a>
      </nav>

      <div class="cs-header-right">
        <div class="profile-container">
          <span class="cs-user-text">Hi, <span id="user-name">User</span></span>
          <img
            src="images/profile_icon.png"
            alt="Profile"
            class="cs-user-icon"
          />
          <div class="profile-dropdown">
            <div class="profile-overview">
              <div class="profile-header">
                <img src="images/profile_icon.png" alt="Profile" class="profile-avatar" />
                <div>
                  <p><strong id="dropdown-user-name">User</strong></p>
                  <p class="profile-id">ID: CS-12345</p>
                </div>
              </div>
              <div class="profile-details">
                <p><strong>Email:</strong> <span id="dropdown-user-email">user@cinespot.com</span></p>
                <p><strong>Member Since:</strong> <span id="dropdown-member-since">Jan 2024</span></p>
                <p><strong>Tickets Booked:</strong> <span id="dropdown-tickets">0</span></p>
              </div>
            </div>
            <div class="profile-menu">
              <a href="profile.html" class="profile-link">View Profile</a>
              <a href="booking-history.html" class="profile-link">Booking History</a>
              <a href="account-settings.html" class="profile-link">Account Settings</a>
              <a href="login.html" class="profile-link signout">Sign Out</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="cs-main">
    <section class="cs-movies-header">
      <h1 class="cs-movies-title">Movies</h1>
    </section>

    <div class="search-container">
      <input id="movie-search-input" class="movie-search-input" type="search" placeholder="Search movies..." aria-label="Search movies" />
      <div id="search-no-results" class="search-no-results" role="status" aria-live="polite">No movies found</div>
    </div>

    <div class="cs-divider"></div>

    <section id="now-showing" class="movie-section" data-section="now-showing">
      <h2 class="movie-section-title">Now Showing</h2>
      <div class="movie-row">
        <button class="scroll-btn scroll-prev" type="button">&laquo;</button>
        <div class="carousel-wrapper">
          <div class="carousel-track" data-carousel="now-showing"></div>
        </div>
        <button class="scroll-btn scroll-next" type="button">&raquo;</button>
      </div>
    </section>

    <div class="cs-divider"></div>

    <section id="advance-ticket" class="movie-section" data-section="advance-ticket">
      <h2 class="movie-section-title">Advance Ticket Selling</h2>
      <div class="movie-row">
        <button class="scroll-btn scroll-prev" type="button">&laquo;</button>
        <div class="carousel-wrapper">
          <div class="carousel-track" data-carousel="advance-ticket"></div>
        </div>
        <button class="scroll-btn scroll-next" type="button">&raquo;</button>
      </div>
    </section>

    <div class="cs-divider"></div>

    <section id="coming-soon" class="movie-section" data-section="coming-soon">
      <h2 class="movie-section-title">Coming Soon</h2>
      <div class="movie-row">
        <button class="scroll-btn scroll-prev" type="button">&laquo;</button>
        <div class="carousel-wrapper">
          <div class="carousel-track" data-carousel="coming-soon"></div>
        </div>
        <button class="scroll-btn scroll-next" type="button">&raquo;</button>
      </div>
    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
